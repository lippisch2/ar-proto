<!DOCTYPE html>
<html>
<head>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin:0;overflow:hidden;">
  <!-- debugUIEnabled: false masque les boîtes texte en bas -->
  <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
    
    <!-- smooth pour stabiliser le suivi -->
    <a-marker preset="hiro" smooth="true" smoothCount="10" smoothTolerance="0.01" smoothThreshold="5">
      
      <!-- radius="0.08" (double de 0.015) et position="0.05 0 0" (5cm sur l'axe X) -->
<a-entity position="0 1 0" rotation="45 0 90">
    <!-- 1. Trajectoire (Axe de travail) -->
    <a-cylinder position="0 0.15 0" radius="0.02" height="0.5" color="yellow" opacity="0.5"></a-cylinder>
    
    <!-- 2. Cible (Lésion) -->
    <a-sphere position="0 0 0" radius="0.05" color="red"></a-sphere>
    
    <!-- 3. Anneau de guidage (Feedback visuel) -->
    <a-ring position="0 0.05 0" radius-inner="0.03" radius-outer="0.06" color="white" rotation="-90 0 0"></a-ring>
</a-entity>
    </a-marker>
    <a-entity camera></a-entity>
  </a-scene>
</body>
</html>
