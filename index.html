<!DOCTYPE html>
<html>
<head>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin:0;overflow:hidden;">
  <!-- debugUIEnabled: false masque les boîtes texte en bas -->

<!-- Curseurs de contrôle -->
<!-- Interface de contrôle avec affichage des valeurs -->
<div style="position: absolute; top: 10px; left: 10px; z-index: 1000; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 20px; color: white; font-family: sans-serif; font-size: 14px;">
    <div style="margin-bottom: 5px;">
        Angle X: <span id="valX">0</span>°<br>
        <input type="range" id="rotX" min="-90" max="90" value="0" style="width: 150px;">
    </div>
    <div style="margin-bottom: 5px;">
        Angle Y: <span id="valY">0</span>°<br>
        <input type="range" id="rotY" min="-90" max="90" value="0" style="width: 150px;">
    </div>
    <div>
        Angle Z: <span id="valZ">0</span>°<br>
        <input type="range" id="rotZ" min="-90" max="90" value="0" style="width: 150px;">
    </div>
</div>

<a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
    <a-marker preset="hiro">
        <!-- L'entité groupe qui reçoit la rotation -->
        <a-entity id="guide-group" position="0 1 0" rotation="0 0 0">
          <a-cylinder position="0 0.15 0" radius="0.01" height="0.8" color="yellow" opacity="0.5"></a-cylinder>
    <!-- 2. Cible (Lésion) -->
          <a-sphere position="0 0 0" radius="0.05" color="red"></a-sphere>
    <!-- 3. Anneau de guidage (Feedback visuel) -->
          <a-ring position="0 0.05 0" radius-inner="0.03" radius-outer="0.06" color="white" rotation="-90 0 0"></a-ring>
          <a-ring position="0 0.3 0" radius-inner="0.03" radius-outer="0.06" color="white" rotation="-90 0 0"></a-ring>
        </a-entity>
    </a-marker>
    <a-entity camera></a-entity>
</a-scene>

<script>
  const guide = document.getElementById('guide-group');
  const sliders = ['X', 'Y', 'Z'];
  
  sliders.forEach(axis => {
    const input = document.getElementById('rot' + axis);
    const display = document.getElementById('val' + axis);
    
    input.addEventListener('input', () => {
      // Met à jour l'affichage numérique
      display.textContent = input.value;
      // Met à jour la rotation de l'entité
      guide.setAttribute('rotation', {
        x: document.getElementById('rotX').value,
        y: document.getElementById('rotY').value,
        z: document.getElementById('rotZ').value
      });
    });
  });
</script>

</body>
</html>
