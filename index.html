<!DOCTYPE html>
<html>
<head>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin:0;overflow:hidden;">
  <!-- debugUIEnabled: false masque les boîtes texte en bas -->
  <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
    
    <!-- smooth pour stabiliser le suivi -->
    <a-marker preset="hiro" smooth="true" smoothCount="10" smoothTolerance="0.01" smoothThreshold="5">
      
      <!-- radius="0.08" (double de 0.015) et position="0.05 0 0" (5cm sur l'axe X) -->
    <a-cylinder position="0.3 0.7 0" 
            rotation="-30 0 10" 
            radius="0.007" height="0.4" 
            color="green" material="opacity:0.8;"></a-cylinder>
      
    </a-marker>
    
    <a-entity camera></a-entity>
  </a-scene>
</body>
</html>
