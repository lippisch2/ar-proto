<!DOCTYPE html>
<html>
<head>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin:0;overflow:hidden;">
  <!-- debugUIEnabled: false masque les boîtes texte en bas -->

<!-- Curseurs de contrôle -->
<!-- Interface de contrôle avec affichage des valeurs -->
<div style="position: absolute; top: 10px; left: 10px; z-index: 1000; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 10px; color: white; font-family: sans-serif; font-size: 14px;">
    <!-- Ligne X -->
    <div style="margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between;">
        <div style="width: 100px;">Rot X: <span id="valX">0</span>°</div>
        <input type="range" id="rotX" min="-90" max="90" value="0" style="width: 80px; margin: 0 10px;">
        <input type="number" id="posX" placeholder="X" style="width: 50px;">
    </div>
    <!-- Ligne Y -->
    <div style="margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between;">
        <div style="width: 100px;">Rot Y: <span id="valY">0</span>°</div>
        <input type="range" id="rotY" min="-90" max="90" value="0" style="width: 80px; margin: 0 10px;">
        <input type="number" id="posY" placeholder="Y" style="width: 50px;">
    </div>
    <!-- Ligne Z -->
    <div style="display: flex; align-items: center; justify-content: space-between;">
        <div style="width: 100px;">Rot Z: <span id="valZ">0</span>°</div>
        <input type="range" id="rotZ" min="-90" max="90" value="0" style="width: 80px; margin: 0 10px;">
        <input type="number" id="posZ" placeholder="Z" style="width: 50px;">
    </div>
</div>

<a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
    <a-marker preset="hiro">
        <!-- L'entité groupe qui reçoit la rotation -->
        <a-entity id="guide-group" position="0 1 0" rotation="0 0 0">
          <a-cylinder position="0 0.15 0" radius="0.01" height="0.8" color="yellow" opacity="0.5"></a-cylinder>
    <!-- 2. Cible (Lésion) -->
          <a-sphere position="0 0 0" radius="0.05" color="red"></a-sphere>
    <!-- 3. Anneau de guidage (Feedback visuel) -->
          <a-ring position="0 0.05 0" radius-inner="0.03" radius-outer="0.06" color="white" rotation="-90 0 0"></a-ring>
          <a-ring position="0 0.3 0" radius-inner="0.03" radius-outer="0.06" color="white" rotation="-90 0 0"></a-ring>
        </a-entity>
    </a-marker>
    <a-entity camera></a-entity>
</a-scene>

<script>
  const guide = document.getElementById('guide-group');
  
  function updateGuide() {
      // On récupère les valeurs et on force la conversion en nombre
      // Si le champ est vide, on utilise 0
      const rx = parseFloat(document.getElementById('rotX').value) || 0;
      const ry = parseFloat(document.getElementById('rotY').value) || 0;
      const rz = parseFloat(document.getElementById('rotZ').value) || 0;
      
      const px = parseFloat(document.getElementById('posX').value) || 0;
      const py = parseFloat(document.getElementById('posY').value) || 0;
      const pz = parseFloat(document.getElementById('posZ').value) || 0;

      // Mise à jour rotation
      guide.setAttribute('rotation', { x: rx, y: ry, z: rz });
      
      // Mise à jour position (conversion cm vers mètres)
      guide.setAttribute('position', { x: px/100, y: py/100, z: pz/100 });
  }

  // Écouteurs pour les sliders
  ['X', 'Y', 'Z'].forEach(axis => {
      // Slider
      document.getElementById('rot' + axis).addEventListener('input', (e) => {
          document.getElementById('val' + axis).textContent = e.target.value;
          updateGuide();
      });
      // Zone texte
      document.getElementById('pos' + axis).addEventListener('input', updateGuide);
  });
</script>
</body>
</html>
