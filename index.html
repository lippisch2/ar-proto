<!DOCTYPE html>
<html>
<head>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin:0;overflow:hidden;">
<div id="marker-status" style="position:absolute;bottom:20px;left:50%;transform:translateX(-50%);z-index:1000;background:rgba(0,0,0,0.7);padding:6px 16px;border-radius:20px;color:#ff4444;font-family:sans-serif;font-size:13px;font-weight:bold;">Marker: not detected</div>
<div style="position:absolute;top:10px;left:10px;z-index:1000;background:rgba(0,0,0,0.8);padding:15px;border-radius:10px;color:white;font-family:sans-serif;font-size:14px;display:flex;flex-direction:column;gap:6px;min-width:200px;">
  <div style="display:flex;justify-content:space-between;align-items:center;">
    <span>World X (dx):</span>
    <input id="inpDx" type="number" value="27.5" step="0.5" style="width:70px;text-align:right;"> cm
  </div>
  <div style="display:flex;justify-content:space-between;align-items:center;">
    <span>Xm:</span>
    <input id="inpXm" type="number" value="0" step="0.5" style="width:70px;text-align:right;"> cm
  </div>
  <div style="display:flex;justify-content:space-between;align-items:center;">
    <span>Zm:</span>
    <input id="inpZm" type="number" value="0" step="0.5" style="width:70px;text-align:right;"> cm
  </div>
  <hr style="border-color:#555;width:100%;">
  <div style="display:flex;justify-content:space-between;align-items:center;">
    <span>Rot Y:</span>
    <input id="inpRotY" type="number" value="0" step="1" style="width:70px;text-align:right;"> &deg;
  </div>
  <div style="display:flex;justify-content:space-between;align-items:center;">
    <span>Rot X:</span>
    <input id="inpRotX" type="number" value="0" step="1" style="width:70px;text-align:right;"> &deg;
  </div>
  <div style="display:flex;justify-content:space-between;align-items:center;">
    <span>Rot Z:</span>
    <input id="inpRotZ" type="number" value="0" step="1" style="width:70px;text-align:right;"> &deg;
  </div>
  <hr style="border-color:#555;width:100%;">
  <div style="display:flex;justify-content:space-between;align-items:center;">
    <span>Upload:</span>
    <input id="inpFile" type="file" accept="image/*" style="width:130px;color:white;">
  </div>
  <div style="display:flex;justify-content:space-between;align-items:center;">
    <span>Img width:</span>
    <input id="inpImgW" type="number" value="35" step="1" style="width:70px;text-align:right;"> cm
  </div>
</div>

<a-scene embedded arjs="sourceType:webcam;debugUIEnabled:false;">
  <a-marker id="marker" preset="hiro" emitevents="true">
    <a-entity id="world-offset" position="0 0.275 0">
      <a-entity id="user-coords" rotation="0 0 -90">
        <a-entity id="target-marker" position="0 0 0" rotation="0 0 0">
          <a-cylinder position="0 0 0.075" radius="0.005" height="0.15" color="yellow" opacity="0.5" rotation="-90 0 0"></a-cylinder>
          <a-sphere position="0 0 0" radius="0.04" color="red"></a-sphere>
          <a-ring position="0 0 0.05" radius-inner="0.02" radius-outer="0.05" color="white"></a-ring>
          <a-ring position="0 0 0.10" radius-inner="0.02" radius-outer="0.05" color="white"></a-ring>
        </a-entity>
        <a-image id="loaded-image" rotation="-90 0 0" width="0.35" material="opacity:0.6;transparent:true" visible="false"></a-image>
      </a-entity>
    </a-entity>
  </a-marker>
  <a-entity camera></a-entity>
</a-scene>

<script>
  const statusEl = document.getElementById('marker-status');
  const markerEl = document.getElementById('marker');

  markerEl.addEventListener('markerFound', () => {
    statusEl.textContent = 'Marker: detected';
    statusEl.style.color = '#44ff44';
  });
  markerEl.addEventListener('markerLost', () => {
    statusEl.textContent = 'Marker: not detected';
    statusEl.style.color = '#ff4444';
  });

  const worldOffset = document.getElementById('world-offset');
  const userCoords = document.getElementById('user-coords');
  const targetMarker = document.getElementById('target-marker');
  const loadedImage = document.getElementById('loaded-image');

  const inpDx = document.getElementById('inpDx');
  const inpXm = document.getElementById('inpXm');
  const inpZm = document.getElementById('inpZm');
  const inpRotY = document.getElementById('inpRotY');
  const inpRotX = document.getElementById('inpRotX');
  const inpRotZ = document.getElementById('inpRotZ');
  const inpFile = document.getElementById('inpFile');
  const inpImgW = document.getElementById('inpImgW');

  function updateScene() {
    const dx = (parseFloat(inpDx.value) || 0) / 100;
    const xm = (parseFloat(inpXm.value) || 0) / 100;
    const zm = (parseFloat(inpZm.value) || 0) / 100;
    const ry = parseFloat(inpRotY.value) || 0;
    const rx = parseFloat(inpRotX.value) || 0;
    const rz = parseFloat(inpRotZ.value) || 0;
    const iw = (parseFloat(inpImgW.value) || 35) / 100;

    worldOffset.setAttribute('position', {x: 0, y: dx, z: 0});
    targetMarker.setAttribute('position', {x: xm, y: 0, z: zm});
    targetMarker.setAttribute('rotation', {x: rx, y: ry, z: rz});
    loadedImage.setAttribute('width', iw);
  }

  inpFile.addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
      loadedImage.setAttribute('src', ev.target.result);
      loadedImage.setAttribute('visible', true);
    };
    reader.readAsDataURL(file);
  });

  [inpDx, inpXm, inpZm, inpRotY, inpRotX, inpRotZ, inpImgW].forEach(el => {
    el.addEventListener('input', updateScene);
  });

  updateScene();
</script>
</body>
</html>
